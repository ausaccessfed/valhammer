name: PR Housekeeping dispatch
on:
  pull_request:
    types: [opened, reopened]
jobs:
  pr_housekeeping:
    name: 'PR Housekeeping dispatch'
    runs-on: ubuntu-slim
    steps:
      - uses: ausaccessfed/workflows/.github/actions/dispatcher@main
        with:
          EVENT_TYPE: 'pr-housekeeping-dispatch'

